# Minimal worker for local OpenAI-compatible LLMs (Ollama, vLLM, etc.).
# Deploy instead of config/worker.minimal.yaml — same worker name/version for config/saga.minimal.yaml.
# No API key required; set WARDEN_LOCAL_LLM_BASE_URL when the worker runs in Compose (see Installation).
kind: worker
name: minimal-worker
namespace: default
version: "1.0.0"
provider: local
model_name: llama3.2
system_prompt: |
  You are a governed workflow agent running inside Warden.
  Complete the assigned task using the structured output format required by the step.
