# Mock MCP demo saga — two reason steps: greet, then summarize prior output (no policy/HITL).
# Requires: warden deploy -f config/worker.mock-mcp.yaml
kind: saga
name: mock-mcp-saga
namespace: default
version: "0.1.0"
description: Greet by name via mock LLM and echo MCP; summarize the greeting in a second step.
steps:
  - id: greet
    name: greet
    kind: reason
    worker: mock-mcp-worker
    worker_version: "0.1.0"
    prompt: mock-greet.j2
    with:
      name:
        from: $.input.name
    tools:
      allow:
        - name: echo
    timeout_seconds: 300
    max_turns: 5

  - id: summarize
    name: summarize
    kind: reason
    worker: mock-mcp-worker
    worker_version: "0.1.0"
    prompt: mock-summarize.j2
    with:
      greeting:
        from: $.steps.greet.output.data.greeting
    tools:
      allow:
        - name: echo
    timeout_seconds: 300
    max_turns: 5
