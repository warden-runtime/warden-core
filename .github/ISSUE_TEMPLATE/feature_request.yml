name: Feature request
description: Propose a kernel, CLI, or docs improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow or operator pain does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Warden to behave?
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Open-core kernel
        - Enterprise plugin (optional)
        - Documentation only
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow the project's Code of Conduct
          required: true
